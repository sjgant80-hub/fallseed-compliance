<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--violet:#a855f7;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:8px 11px;outline:none;font-size:13px;width:100%}
textarea{min-height:80px;resize:vertical;font-family:var(--mono);font-size:12px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:64px 1fr}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none;padding:0 22px;gap:14px;position:sticky;top:0;z-index:50}
.brand .mark{width:38px;height:38px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:22px;color:var(--void)}
.brand{display:flex;align-items:center;gap:12px}
.brand .name{font-family:var(--serif);font-weight:700;font-size:18px}
.brand .seal{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.16em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;justify-content:center;gap:4px;flex-wrap:wrap;overflow-x:auto}
nav.tabs button{padding:8px 14px;font-size:13px;color:var(--cream-dim);letter-spacing:0.04em;border-radius:4px;white-space:nowrap}
nav.tabs button:hover{color:var(--cream);background:var(--ink)}
nav.tabs button.active{color:var(--brass);background:var(--ink);border-bottom:2px solid var(--brass)}
.tier{padding:6px 12px;border-radius:3px;font-size:11px;color:var(--cream-dim);font-family:var(--mono);border:1px solid var(--line);letter-spacing:0.06em;text-transform:uppercase;cursor:pointer}
main{padding:24px 32px 80px;overflow-y:auto;max-width:1400px;margin:0 auto;width:100%}
.hero{background:linear-gradient(135deg,rgba(184,151,74,0.08),rgba(255,140,0,0.04));border:1px solid var(--brass);border-radius:6px;padding:28px 30px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:8px;color:var(--brass)}
.hero .lede{font-size:14px;color:var(--cream-dim);line-height:1.7;max-width:920px}
.hero .v-badge{display:inline-block;background:var(--brass);color:var(--void);font-family:var(--mono);font-size:10px;letter-spacing:0.12em;padding:3px 8px;border-radius:3px;margin-left:10px;vertical-align:middle}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin:24px 0 14px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}
.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:18px 20px;margin-bottom:14px}
.card h3{font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:10px}
.fw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.fw-card{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:18px;cursor:pointer;transition:border-color .15s;position:relative}
.fw-card:hover{border-color:var(--brass)}
.fw-card.active{border-color:var(--brass);background:linear-gradient(180deg,rgba(184,151,74,.04),transparent)}
.fw-card .auth{font-family:var(--mono);font-size:9px;color:var(--brass);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}
.fw-card .name{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:4px}
.fw-card .desc{font-size:12px;color:var(--cream-dim);line-height:1.55;margin-bottom:10px}
.fw-card .meta{display:flex;gap:10px;font-family:var(--mono);font-size:10px;color:var(--cream-muted)}
.fw-card .stub-flag{position:absolute;top:10px;right:12px;background:var(--ink);color:var(--violet);font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:11px;letter-spacing:.1em;text-transform:uppercase}
.fw-card .active-flag{position:absolute;top:10px;right:12px;background:var(--brass);color:var(--void);font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.btn{padding:8px 16px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.brass:hover{background:var(--amber)}
.btn.big{padding:10px 22px;font-size:13px}
.btn.sm{padding:5px 11px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:10px 20px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.66);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:60px 22px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;padding:24px 26px;max-width:720px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:18px;margin-bottom:16px;color:var(--brass)}
.modal .close{position:absolute;top:12px;right:14px;color:var(--cream-muted);font-size:22px;line-height:1}
.modal .close:hover{color:var(--cream)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;background:var(--void-2);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.tbl th{background:var(--ink);color:var(--cream-muted);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:10px 12px;font-weight:600;border-bottom:1px solid var(--line)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(184,151,74,.04)}
.tbl td .code{font-family:var(--mono);color:var(--brass);font-size:11px;white-space:nowrap}
.status-pill{display:inline-block;padding:3px 9px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.status-pill.pending{background:rgba(168,163,149,.16);color:var(--cream-dim)}
.status-pill.inprogress{background:rgba(96,165,250,.15);color:var(--blue)}
.status-pill.implemented{background:rgba(251,191,36,.15);color:var(--yellow)}
.status-pill.evidenced{background:rgba(74,222,128,.18);color:var(--green)}
.status-pill.audited{background:rgba(184,151,74,.2);color:var(--brass)}
.status-pill.na{background:rgba(110,106,94,.2);color:var(--cream-muted)}
.controls-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.controls-bar input,.controls-bar select{max-width:240px;font-size:12px}
.inspect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.inspect-card{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px}
.inspect-card .num{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--brass)}
.inspect-card .lbl{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.gap-bar{background:var(--ink);border-radius:4px;height:8px;overflow:hidden;border:1px solid var(--line);margin-top:6px}
.gap-bar > div{height:100%;background:linear-gradient(90deg,var(--brass),var(--amber));transition:width .3s}
.preview-area{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px;font-family:var(--mono);font-size:11px;line-height:1.5;color:var(--cream-dim);white-space:pre-wrap;max-height:60vh;overflow:auto;min-height:300px}
.preview-area.busy{color:var(--amber)}
.preview-area.streaming{color:var(--cream);border-color:var(--green)}
.preview-area .cursor{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink 1s infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.example-chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 14px}
.example-chips button{padding:5px 10px;font-size:11px;border:1px solid var(--line);border-radius:11px;color:var(--cream-dim);background:var(--ink)}
.example-chips button:hover{border-color:var(--brass);color:var(--cream)}
.disclaimer{background:rgba(139,26,26,.12);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:16px;font-size:12px;line-height:1.55;color:var(--cream-dim)}
.disclaimer strong{color:var(--brass)}
.provider-row{display:grid;grid-template-columns:auto 90px 1fr 110px 80px;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;align-items:center;font-size:12px;background:var(--ink)}

.provider-row .toggle.on{background:var(--green)}
.provider-row .toggle::after{content:'';position:absolute;width:16px;height:16px;background:var(--cream);border-radius:50%;top:2px;left:2px;transition:left .2s}
.provider-row .toggle.on::after{left:18px}
.provider-row .nm{font-family:var(--mono);font-size:11px;color:var(--cream);font-weight:600}
.provider-row .tier-tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:2px 6px;border-radius:3px;text-transform:uppercase;text-align:center}

.provider-row .tier-tag.t2{background:rgba(96,165,250,.15);color:var(--blue)}
.provider-row .tier-tag.tf{background:rgba(168,85,247,.15);color:var(--violet)}
.provider-row .tier-tag.tp{background:rgba(255,140,0,.15);color:var(--amber)}

.provider-row .status-mini{font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-align:right}
.cascade-trace{font-family:var(--mono);font-size:11px;background:var(--ink);border:1px solid var(--line);border-radius:3px;padding:10px 12px;margin-top:8px;max-height:200px;overflow-y:auto}
.cascade-trace .line{padding:3px 0;border-bottom:1px solid var(--line-soft)}
.cascade-trace .line:last-child{border-bottom:none}
.cascade-trace .line.ok{color:var(--green)}
.cascade-trace .line.fail{color:var(--cream-muted)}
.cascade-trace .line .t{color:var(--cream-muted);margin-right:8px}
.cascade-trace .line .p{color:var(--brass);font-weight:600}
.evidence-item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;background:var(--ink);align-items:center}
.evidence-item .title{font-weight:600;color:var(--cream)}
.evidence-item .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-top:3px;letter-spacing:.06em}
.evidence-item .meta .hash{color:var(--brass)}
.policy-row{display:grid;grid-template-columns:80px 1fr auto;gap:12px;padding:11px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;background:var(--ink);align-items:center}
.policy-row .code{font-family:var(--mono);color:var(--brass);font-weight:600;font-size:12px}
.policy-row .title{font-weight:600;color:var(--cream)}
.policy-row .fws{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.06em;margin-top:3px}
.scope-item{display:grid;grid-template-columns:90px 1fr auto;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;background:var(--ink);align-items:center}
.scope-item .kind{font-family:var(--mono);font-size:10px;color:var(--violet);letter-spacing:.08em;text-transform:uppercase}
.audit-row{padding:12px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;background:var(--ink)}
.audit-row .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.audit-row .head .title{font-weight:600}
.audit-row .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.06em}
.empty-state{padding:32px 24px;text-align:center;color:var(--cream-muted);background:var(--ink);border:1px dashed var(--line);border-radius:5px;font-size:13px}
.crossmap-row{display:grid;grid-template-columns:200px 1fr;gap:14px;padding:10px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;background:var(--ink);align-items:start}
.crossmap-row .src{font-family:var(--mono);color:var(--brass);font-size:11px}
.crossmap-row .targets{display:flex;flex-wrap:wrap;gap:6px}
.crossmap-row .target-pill{font-family:var(--mono);font-size:10px;background:var(--void);padding:3px 8px;border-radius:11px;border:1px solid var(--line);color:var(--cream-dim);letter-spacing:.04em}
</style>
</head>

    <div class="brand">

const IDB_NAME = 'fallseed-compliance-v1';
let db;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('config'))   d.createObjectStore('config');
      if (!d.objectStoreNames.contains('controls')) d.createObjectStore('controls', { keyPath:'id' });
      if (!d.objectStoreNames.contains('evidence')) d.createObjectStore('evidence', { keyPath:'id' });
      if (!d.objectStoreNames.contains('scope'))    d.createObjectStore('scope',    { keyPath:'id' });
      if (!d.objectStoreNames.contains('policies')) d.createObjectStore('policies', { keyPath:'id' });
      if (!d.objectStoreNames.contains('audits'))   d.createObjectStore('audits',   { keyPath:'id' });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = rej;
  });
}
function idbGet(s, k) { return new Promise(r => { const tx=db.transaction(s,'readonly'); const q=tx.objectStore(s).get(k); q.onsuccess=()=>r(q.result); }); }
function idbGetAll(s) { return new Promise(r => { const tx=db.transaction(s,'readonly'); const q=tx.objectStore(s).getAll(); q.onsuccess=()=>r(q.result||[]); }); }
function idbPut(s, v, k) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const o=tx.objectStore(s); const q=k!=null?o.put(v,k):o.put(v); q.onsuccess=()=>r(true); }); }
function idbDelete(s, k) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const q=tx.objectStore(s).delete(k); q.onsuccess=()=>r(true); }); }
function idbClear(s) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const q=tx.objectStore(s).clear(); q.onsuccess=()=>r(true); }); }

// ═══════════════════════════════════════════════════════════════
// P3 AUDIT CHAIN · prevHash + SHA-256
// ═══════════════════════════════════════════════════════════════
async function sha256Hex(input) {
  const buf = new TextEncoder().encode(typeof input === 'string' ? input : JSON.stringify(input));
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
}
let chainHead = '0'.repeat(64);
async function chainNext(payload) {
  const prev = chainHead;
  const full = prev + ':' + JSON.stringify(payload) + ':' + now();
  const hash = await sha256Hex(full);
  chainHead = hash;
  await idbPut('config', hash, 'chainHead');
  return { prevHash: prev, hash };
}
async function loadChainHead() {
  const h = await idbGet('config', 'chainHead');
  if (h) chainHead = h;
}

let meshChan;
// ═══════════════════════════════════════════════════════════════
// MESH · upgraded · peer tracker on fall-signal · 2026-06-21
// ═══════════════════════════════════════════════════════════════
window.__fellowSeeds = window.__fellowSeeds || new Map();
let __sigChan = null, __meshChan2 = null, __pingTimer = null;

function __seedSelfInfo() {
  try {
    return {
      source: 'fallseed-' + (SEED.manifest.name || 'unknown'),
      name: SEED.manifest.name || 'unknown',
      prime: SEED.manifest.prime,
      version: SEED.manifest.version,
      level: SEED.manifest.level !== undefined ? SEED.manifest.level : null,
      parent: SEED.manifest.parent || null,
      mesh: SEED.manifest.meshChannel,
      ts: Date.now()
    };
  } catch (e) { return { source: 'fallseed-unknown', ts: Date.now() }; }
}

function __pruneFellowSeeds(maxAgeMs) {
  const cutoff = Date.now() - (maxAgeMs || 90000);
  for (const [k, v] of window.__fellowSeeds.entries()) {
    if (v.lastSeen < cutoff) window.__fellowSeeds.delete(k);
  }
}

function initMesh() {
  try {
    __sigChan = new BroadcastChannel('fall-signal');
    // Announce self
    __sigChan.postMessage({ type: 'hello', ...__seedSelfInfo() });
    // Listen for hellos + pings + replies
    __sigChan.onmessage = e => {
      const m = e.data || {};
      if (!m.type) return;
      if (m.type === 'hello' || m.type === 'pong') {
        if (!m.source || m.source === __seedSelfInfo().source) return;
        const existing = window.__fellowSeeds.get(m.source) || {};
        window.__fellowSeeds.set(m.source, { ...existing, ...m, lastSeen: Date.now() });
        // Trigger a re-render of inspect if visible
        if (typeof state !== 'undefined' && state.active === 'inspect') {
          if (typeof render === 'function') try { render(); } catch (e) {}
        }
      } else if (m.type === 'ping') {
        // Reply with our own info so the pinger can discover us
        try { __sigChan.postMessage({ type: 'pong', ...__seedSelfInfo() }); } catch (e) {}
      }
    };
    // Periodic ping to refresh peer list (every 30s)
    __pingTimer = setInterval(() => {
      try {
        __sigChan.postMessage({ type: 'ping', ...__seedSelfInfo() });
        __pruneFellowSeeds(90000);
      } catch (e) {}
    }, 30000);
    // Also try a vertical mesh channel if SEED defines one
    try {
      const mc = SEED.manifest.meshChannel;
      if (mc && mc !== 'fall-signal') {
        __meshChan2 = new BroadcastChannel(mc);
      }
    } catch (e) {}
  } catch (e) { /* mesh optional */ }
}
function meshBroadcast(type, payload) {
  try {
    meshChan?.postMessage({ v:1, type, source:'fallseed-compliance', payload, ts:now() });
  } catch (e) {}
}

async function cascadeChat(prompt, opts) {
  opts = opts || {};
  const onChunk = opts.onChunk || (() => {});
  const system = opts.system || SEED.buildPromptSystem || 'You are a helpful assistant.';
  const elig = eligibleProviders();
  if (!elig.length) { throw new Error('No providers enabled. Configure one in LLM Providers.'); }
  trace(`cascade starting · ${elig.length} eligible provider(s)`);
  let lastErr = null;
  for (const p of elig) {
    trace(`→ trying ${p.name} (${p.tier})`);
    try {
      const out = await callProvider(p, system, prompt, onChunk);
      trace(`✓ ${p.name} returned ${out.length} chars`, 'ok');
      state.usage[p.id] = state.usage[p.id] || { totalIn:0, totalOut:0, calls:0, lastUsed:0 };
      state.usage[p.id].calls++;
      state.usage[p.id].totalIn += (system+prompt).length;
      state.usage[p.id].totalOut += out.length;
      state.usage[p.id].lastUsed = now();
      await persistUsage();
      return { provider: p.id, text: out };
    } catch (e) {
      trace(`✗ ${p.name}: ${e.message}`, 'fail');
      lastErr = e;
    }
  }
  throw new Error('All providers failed. Last: ' + (lastErr?.message || 'unknown'));
}

async function callProvider(p, system, prompt, onChunk) {
  const cfg = state.providerConfig[p.id] || {};
  const model = cfg.customModel || p.model;
  if (p.id === 'webllm') {
    if (state.webllmStatus !== 'ready') throw new Error('WebLLM not loaded — click Load in Providers tab');
    const reply = await state.webllmEngine.chat.completions.create({
      messages: [{role:'system',content:system},{role:'user',content:prompt}],
      stream: true
    });
    let acc = '';
    for await (const chunk of reply) {
      const d = chunk.choices[0]?.delta?.content || '';
      acc += d; onChunk(d);
    }
    return acc;
  }
  if (p.id === 'google') {
    const url = p.endpoint + '?alt=sse&key=' + encodeURIComponent(cfg.key);
    const body = {
      systemInstruction: { parts: [{ text: system }] },
      contents: [{ role:'user', parts:[{ text: prompt }] }],
      generationConfig: { temperature: 0.4, maxOutputTokens: 4096 }
    };
    const r = await fetch(url, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) });
    if (!r.ok) throw new Error('Google ' + r.status + ': ' + await r.text());
    return await streamSSE(r, onChunk, 'google');
  }
  if (p.id === 'anthropic') {
    const body = {
      model, max_tokens: 4096,
      stream: true,
      system,
      messages: [{ role:'user', content: prompt }]
    };
    const r = await fetch(p.endpoint, {
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':cfg.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + await r.text());
    return await streamSSE(r, onChunk, 'anthropic');
  }
  // OpenAI-compatible (groq, openrouter, cerebras, ollama, lmstudio)
  const body = { model, messages: [{role:'system',content:system},{role:'user',content:prompt}], stream: true, temperature: 0.4 };
  const headers = { 'content-type':'application/json' };
  if (cfg.key) headers['authorization'] = 'Bearer ' + cfg.key;
  const r = await fetch(p.endpoint, { method:'POST', headers, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(p.name + ' ' + r.status + ': ' + (await r.text()).slice(0,160));
  return await streamSSE(r, onChunk, 'openai');
}

async function streamSSE(response, onChunk, kind) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '', acc = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split(/\r?\n/);
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const j = JSON.parse(data);
        let d = '';
        if (kind === 'anthropic') {
          if (j.type === 'content_block_delta') d = j.delta?.text || '';
        } else if (kind === 'google') {
          d = j.candidates?.[0]?.content?.parts?.[0]?.text || '';
        } else {
          d = j.choices?.[0]?.delta?.content || '';
        }
        if (d) { acc += d; onChunk(d); }
      } catch (e) {}
    }
  }
  return acc;
}

// ═══════════════════════════════════════════════════════════════
// JS LITERAL · for Fork Seed packager
// ═══════════════════════════════════════════════════════════════
function jsLiteral(obj, indent=0) {
  const pad = '  '.repeat(indent);
  const padNext = '  '.repeat(indent+1);
  if (obj === null) return 'null';
  if (typeof obj === 'number' || typeof obj === 'boolean') return String(obj);
  if (typeof obj === 'string') {
    if (obj.length > 80 || obj.includes('\n')) return '`' + obj.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$\{/g,'\\${') + '`';
    return "'" + obj.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
  }
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    return '[\n' + obj.map(v => padNext + jsLiteral(v, indent+1)).join(',\n') + '\n' + pad + ']';
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (!keys.length) return '{}';
    return '{\n' + keys.map(k => padNext + (/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k) ? k : JSON.stringify(k)) + ': ' + jsLiteral(obj[k], indent+1)).join(',\n') + '\n' + pad + '}';
  }
  return 'null';
}

window.generateStubCatalogue = async function(key) {
  const f = SEED.frameworks[key];
  if (!f) return;
  const prompt = `Generate the full ${f.name} control catalogue.

Output STRICT JSON only — no preamble, no markdown fences, no commentary.
Schema: an array of objects, each with exactly two fields:
  { "code": "<canonical control identifier>", "title": "<short control title, max 100 chars>" }

For ${f.name} (${f.version}), use the canonical numbering scheme:
${f.themes.map(t => `  • ${t.code} — ${t.name}`).join('\n')}

${f.generateMe || 'Cover every required control / sub-requirement / criterion.'}

Output JSON ONLY. Start with [ and end with ].`;

  if (state.active !== 'build') switchTab('build');
  await new Promise(r => setTimeout(r, 150));
  const inp = document.getElementById('buildPrompt');
  const out = document.getElementById('buildOutput');
  if (!inp || !out) { toast('build tab not ready', true); return; }
  inp.value = prompt;
  out.className = 'preview-area streaming';
  out.textContent = '';
  let acc = '';
  try {
    await cascadeChat(prompt, { onChunk: d => { acc += d; out.textContent += d; out.scrollTop = out.scrollHeight; } });
    out.className = 'preview-area';
    // Try to parse + auto-apply
    const m = acc.match(/\[[\s\S]*\]/);
    if (m) {
      try {
        const parsed = JSON.parse(m[0]);
        if (Array.isArray(parsed) && parsed.length && parsed.every(x => x.code && x.title)) {
          if (confirm(`Parsed ${parsed.length} controls for ${f.shortName}. Apply to the seed?`)) {
            SEED.frameworks[key].controls = parsed.map(p => ({ code: String(p.code), title: String(p.title) }));
            SEED.frameworks[key].stub = false;
            await idbPut('config', SEED, 'forkedSeed');
            toast(`✓ ${parsed.length} controls loaded into ${f.shortName}`);
            switchTab('frameworks');
          }
        }
      } catch (e) { toast('parsed text not valid JSON · raw output kept in Build tab', true); }
    }
  } catch (e) {
    out.className = 'preview-area';
    out.textContent = '✗ ' + e.message;
  }
};

window.saveControl = async function(framework, code, title) {
  const status = $('#ecStatus').value;
  const owner  = $('#ecOwner').value.trim();
  const due    = $('#ecDue').value;
  const notes  = $('#ecNotes').value.trim();
  const recs = await idbGetAll('controls');
  let r = recs.find(x => x.framework === framework && x.controlCode === code);
  if (!r) r = { id: uid('ctl'), framework, controlCode: code, title, created: now() };
  Object.assign(r, { status, owner, due, notes, lastModified: now() });
  const chain = await chainNext({ kind:'control.update', id:r.id, status, owner });
  r.prevHash = chain.prevHash; r.hash = chain.hash;
  await idbPut('controls', r);
  meshBroadcast('control.updated', { id:r.id, framework, code, status });

  // ─── Cross-map writeback ───────────────────────────────────
  // If this control was marked evidenced or audited, auto-flag mapped controls
  // as "mappedcandidate" status (visually distinct purple pill) so the user
  // can see what work just got de-duplicated.
  let mappedCount = 0;
  if (status === 'evidenced' || status === 'audited') {
    const srcKey = `${framework}:${code}`;
    const mapping = SEED.crossMap.find(m => m.from === srcKey);
    if (mapping) {
      for (const targetKey of mapping.to) {
        const [tFw, tCode] = targetKey.split(':');
        if (!state.activeFrameworks.includes(tFw)) continue;
        let mr = recs.find(x => x.framework === tFw && x.controlCode === tCode);
        if (mr && (mr.status === 'evidenced' || mr.status === 'audited')) continue;
        if (!mr) {
          // find title from frameworks catalogue
          const fw = SEED.frameworks[tFw];
          const ctlDef = fw?.controls?.find(c => c.code === tCode);
          mr = { id: uid('ctl'), framework: tFw, controlCode: tCode, title: ctlDef?.title || tCode, created: now() };
        }
        mr.status = 'mappedcandidate';
        mr.mappedFrom = srcKey;
        mr.lastModified = now();
        mr.notes = (mr.notes ? mr.notes + '\n' : '') + `[auto] mapped from ${srcKey} (${status}) at ${new Date().toISOString()}`;
        const c = await chainNext({ kind:'control.crossmap', id:mr.id, mappedFrom:srcKey, status:mr.status });
        mr.prevHash = c.prevHash; mr.hash = c.hash;
        await idbPut('controls', mr);
        mappedCount++;
      }
    }
  }

  closeModal();
  toast(mappedCount ? `control saved · ${mappedCount} mapped control${mappedCount===1?'':'s'} flagged` : 'control saved');
  render();
};

window.saveEvidenceText = async function() {
  const title = $('#evTitle').value.trim();
  const content = $('#evContent').value.trim();
  const desc = $('#evDesc').value.trim();
  const links = $('#evLinks').value.split(',').map(s => s.trim()).filter(Boolean);
  if (!title || !content) { toast('title and content required', true); return; }
  const contentHash = await sha256Hex(content);
  const item = { id: uid('ev'), type:'text', title, description: desc, content, contentHash, controlIds: links, capturedAt: now(), capturedBy: 'local' };
  const chain = await chainNext({ kind:'evidence.add', id:item.id, contentHash });
  item.prevHash = chain.prevHash; item.hash = chain.hash;
  await idbPut('evidence', item);
  closeModal();
  toast('evidence captured');
  render();
};

window.saveEvidenceFile = async function() {
  const title = $('#evTitle').value.trim();
  const desc = $('#evDesc').value.trim();
  const links = $('#evLinks').value.split(',').map(s => s.trim()).filter(Boolean);
  const fInp = $('#evFile');
  const file = fInp.files[0];
  if (!title || !file) { toast('title and file required', true); return; }
  const buf = await file.arrayBuffer();
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  const contentHash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
  const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
  const item = { id: uid('ev'), type:'file', title, description: desc, fileName: file.name, fileSize: file.size, fileMime: file.type, content: b64, contentHash, controlIds: links, capturedAt: now(), capturedBy: 'local' };
  const chain = await chainNext({ kind:'evidence.add', id:item.id, contentHash });
  item.prevHash = chain.prevHash; item.hash = chain.hash;
  await idbPut('evidence', item);
  closeModal();
  toast('evidence captured (' + Math.round(file.size/1024) + ' KB)');
  render();
};

// ─── GAP ANALYSIS ──────────────────────────────────────────────
async function renderGap(main) {
  const recs = await idbGetAll('controls');
  const byFw = {};
  for (const r of recs) {
    byFw[r.framework] = byFw[r.framework] || {};
    byFw[r.framework][r.controlCode] = r.status;
  }
  const blocks = [];
  for (const fwKey of state.activeFrameworks) {
    const f = SEED.frameworks[fwKey];
    if (!f || f.stub) continue;
    const total = f.controls.length;
    const counts = { pending:0, inprogress:0, implemented:0, evidenced:0, audited:0, na:0 };
    for (const c of f.controls) {
      const s = byFw[fwKey]?.[c.code] || 'pending';
      counts[s] = (counts[s]||0) + 1;
    }
    const done = counts.evidenced + counts.audited + counts.na;
    const pct = total ? Math.round(done * 100 / total) : 0;
    const missing = f.controls.filter(c => {
      const s = byFw[fwKey]?.[c.code] || 'pending';
      return s === 'pending' || s === 'inprogress';
    });
    blocks.push(`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <h3>${esc(f.shortName)}</h3>
        <div style="font-family:var(--mono);font-size:12px;color:var(--brass)">${pct}% complete (${done}/${total})</div>
      </div>
      <div class="gap-bar"><div style="width:${pct}%"></div></div>
      <div style="display:flex;gap:14px;margin-top:14px;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.06em;flex-wrap:wrap">
        <span><span class="status-pill pending">${counts.pending}</span> pending</span>
        <span><span class="status-pill inprogress">${counts.inprogress}</span> in progress</span>
        <span><span class="status-pill implemented">${counts.implemented}</span> implemented</span>
        <span><span class="status-pill evidenced">${counts.evidenced}</span> evidenced</span>
        <span><span class="status-pill audited">${counts.audited}</span> audited</span>
        <span><span class="status-pill na">${counts.na}</span> n/a</span>
      </div>
      ${missing.length ? `<details style="margin-top:14px"><summary style="cursor:pointer;font-size:12px;color:var(--cream-dim)">${missing.length} controls still to close →</summary>
        <div style="margin-top:10px">${missing.slice(0,40).map(c => `<div style="padding:4px 0;font-size:11px;font-family:var(--mono);color:var(--cream-dim)"><span style="color:var(--brass)">${esc(c.code)}</span> · ${esc(c.title)}</div>`).join('')}${missing.length>40?`<div style="font-size:11px;color:var(--cream-muted);margin-top:6px">… and ${missing.length-40} more</div>`:''}</div>
      </details>` : '<div style="margin-top:14px;color:var(--green);font-family:var(--mono);font-size:11px">✓ all controls past in-progress</div>'}
    </div>`);
  }
  main.innerHTML = `
    <div class="section-h"><h2>Gap analysis</h2><div class="sub">${state.activeFrameworks.length} framework${state.activeFrameworks.length===1?'':'s'}</div></div>
    ${blocks.join('') || '<div class="empty-state">activate a non-stub framework to see gap analysis</div>'}
  `;
}

function renderPackager(main) {
  if (!state.pkgDraft) state.pkgDraft = JSON.parse(JSON.stringify(SEED));
  main.innerHTML = `
    <div class="section-h"><h2>Fork Seed</h2><div class="sub">mutate · serialise · download</div></div>
    <div class="card">
      <h3>Mutate the seed</h3>
      <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Edit the SEED constant below. When you click <em>Fork into HTML</em>, the packager fetches this very file, swaps the SEED_DEFAULT block, and downloads the mutated child as a new self-contained HTML file. The child carries the same build engine + packager — your fork is itself a forkable seed.</p>
      <textarea id="pkgJson" rows="20" style="font-family:var(--mono);font-size:11px">${esc(JSON.stringify(state.pkgDraft, null, 2))}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn brass" id="pkgGo">Fork into HTML →</button>
        <button class="btn sm ghost" onclick="state.pkgDraft = JSON.parse(JSON.stringify(SEED_DEFAULT)); render()">reset to default</button>
        <button class="btn sm ghost" onclick="state.pkgDraft = JSON.parse(JSON.stringify(SEED)); render()">reset to current</button>
      </div>
    </div>
  `;
  $('#pkgGo').addEventListener('click', forkSeed);
}
async function forkSeed() {
  let draft;
  try { draft = JSON.parse($('#pkgJson').value); } catch (e) { toast('invalid JSON: ' + e.message, true); return; }
  const currentHtml = await (await fetch(location.href, { cache:'reload' })).text();
  const seedStart = currentHtml.indexOf('const SEED_DEFAULT = {');
  if (seedStart < 0) { toast('cannot find SEED_DEFAULT in source', true); return; }
  let depth = 0, end = -1;
  for (let i = seedStart + 'const SEED_DEFAULT = '.length; i < currentHtml.length; i++) {
    if (currentHtml[i] === '{') depth++;
    else if (currentHtml[i] === '}') { depth--; if (depth === 0) { end = i + 1; break; } }
  }
  if (end < 0) { toast('cannot parse SEED_DEFAULT', true); return; }
  while (end < currentHtml.length && currentHtml[end] === ' ') end++;
  if (currentHtml[end] === ';') end++;
  const newLiteral = 'const SEED_DEFAULT = ' + jsLiteral(draft) + ';';
  const newHtml = currentHtml.slice(0, seedStart) + newLiteral + currentHtml.slice(end);
  // download
  const blob = new Blob([newHtml], { type:'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const slug = (draft.manifest?.name || 'compliance').replace(/[^a-z0-9]+/gi,'-');
  a.href = url; a.download = 'fallseed-' + slug + '-fork.html'; a.click();
  URL.revokeObjectURL(url);
  toast('forked into HTML · saved');
}

    </div><div class="lbl">Seed prime</div></div>
      <div class="inspect-card"><div class="num">${Object.keys(SEED.frameworks).length}</div><div class="lbl">Frameworks loaded</div></div>
      <div class="inspect-card"><div class="num">${state.activeFrameworks.length}</div><div class="lbl">Active</div></div>

      <div class="inspect-card"><div class="num">${evCount}</div><div class="lbl">Evidence items</div></div>
      <div class="inspect-card"><div class="num">${scCount}</div><div class="lbl">Scope items</div></div>
      <div class="inspect-card"><div class="num">${polCount}</div><div class="lbl">Policies adopted</div></div>
      <div class="inspect-card"><div class="num">${auCount}</div><div class="lbl">Audits scheduled</div></div>
    </div>
    <div class="card" style="margin-top:18px">
      <h3>Audit chain head</h3>
      <div style="font-family:var(--mono);font-size:11px;color:var(--brass);word-break:break-all">${esc(chainHead)}</div>
    </div>
    <div class="card">
      <h3>Mesh</h3>
      <div style="font-family:var(--mono);font-size:11px;color:var(--cream-dim)">channel: <span style="color:var(--brass)">${esc(SEED.manifest.meshChannel)}</span> · global signal: <span style="color:var(--brass)">fall-signal</span></div>

      <h3>Manifest</h3>

  `;
}

// ─── SETTINGS ──────────────────────────────────────────────────
async function renderSettings(main) {
  main.innerHTML = `
    <div class="section-h"><h2>Settings</h2></div>
    <div class="card">
      <h3>Export / import</h3>
      <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Export everything (controls, evidence, scope, policies, audits, config + audit chain). Import overwrites.</p>
      <div style="display:flex;gap:8px">
        <button class="btn brass sm" onclick="exportAll()">⬇ export JSON</button>
        <button class="btn sm" onclick="document.getElementById('importFile').click()">⬆ import JSON</button>
        <input id="importFile" type="file" accept=".json" style="display:none" onchange="importAll(this.files[0])">
      </div>
    </div>
    <div class="card">
      <h3>Wipe</h3>
      <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Removes every record from this seed (IDB cleared). Cannot be undone. Audit chain head resets.</p>
      <button class="btn danger sm" onclick="wipeAll()">⚠ wipe everything</button>
    </div>
  `;
}
window.exportAll = async function() {
  const bundle = {
    seed: SEED,
    config: { providerConfig: state.providerConfig, rateLimits: state.rateLimits, usage: state.usage, activeFrameworks: state.activeFrameworks, currentFw: state.currentFw, chainHead },
    controls: await idbGetAll('controls'),
    evidence: await idbGetAll('evidence'),
    scope: await idbGetAll('scope'),
    policies: await idbGetAll('policies'),
    audits: await idbGetAll('audits'),
    exportedAt: now()
  };
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fallseed-compliance-export-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  URL.revokeObjectURL(url);
  toast('exported');
};
window.importAll = async function(file) {
  if (!file) return;
  try {
    const text = await file.text();
    const b = JSON.parse(text);
    if (b.seed) { SEED = b.seed; await idbPut('config', SEED, 'forkedSeed'); }
    if (b.config) {
      state.providerConfig = b.config.providerConfig || {};
      state.activeFrameworks = b.config.activeFrameworks || ['iso27001'];
      state.currentFw = b.config.currentFw || 'iso27001';
      chainHead = b.config.chainHead || chainHead;
      await persistProviderConfig();
      await persistActiveFrameworks();
      await idbPut('config', chainHead, 'chainHead');
    }
    for (const st of ['controls','evidence','scope','policies','audits']) {
      await idbClear(st);
      for (const r of (b[st]||[])) await idbPut(st, r);
    }
    toast('imported · reload to refresh');
    render();
  } catch (e) { toast('import failed: '+e.message, true); }
};
window.wipeAll = async function() {
  if (!confirm('Wipe every record in this seed? This cannot be undone.')) return;
  for (const st of ['controls','evidence','scope','policies','audits']) await idbClear(st);
  chainHead = '0'.repeat(64);
  await idbPut('config', chainHead, 'chainHead');
  toast('wiped');
  render();
};
